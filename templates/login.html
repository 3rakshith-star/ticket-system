<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            background: #020617;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .box {
            background: #0f172a;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 200px;
            border-radius: 6px;
            border: none;
        }

        button {
            padding: 10px;
            width: 220px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Admin Login</h2>
        <form method="post">
            <input type="password" name="password" placeholder="Password">
            <br>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
